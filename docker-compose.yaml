version: "3.9"

services:
  nats:
    image: nats:2.11
    container_name: nats
    restart: unless-stopped
    command: ["-js", "-m", "8222", "--store_dir", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nats-data:

